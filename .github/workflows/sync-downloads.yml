# Keeps dabingabongo.com/downloads in sync with this repo: every push to
# main that changes lyric_chunker.py copies the file into the Dabingabongo
# repo and refreshes its downloads.json entry, which kicks off the site's
# Netlify deploy.
#
# Requires a DABINGABONGO_PUSH_TOKEN repo secret — a fine-grained PAT with
# Contents: Read and write on mikeyd433/Dabingabongo.
name: Sync to dabingabongo downloads

on:
  push:
    branches: [main]
    paths:
      - lyric_chunker.py
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out LyricChunker
        uses: actions/checkout@v4

      - name: Check out Dabingabongo
        uses: actions/checkout@v4
        with:
          repository: mikeyd433/Dabingabongo
          token: ${{ secrets.DABINGABONGO_PUSH_TOKEN }}
          path: site

      - name: Update download file and manifest
        env:
          COMMIT_SUBJECT: ${{ github.event.head_commit.message }}
        run: |
          python3 scripts/sync_downloads.py lyric_chunker.py site \
            --note "$COMMIT_SUBJECT" \
            --commit-sha "$GITHUB_SHA"

      - name: Commit and push to Dabingabongo
        run: |
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads/lyric_chunker.py downloads.json
          if git diff --cached --quiet; then
            echo "Downloads page already up to date."
            exit 0
          fi
          git commit -m "Sync Lyric Chunker from LyricChunker@${GITHUB_SHA::7}"
          git push
